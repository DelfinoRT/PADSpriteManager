<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Items Lab - Work In Progress</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #eaf3ff;
      background:
        radial-gradient(600px 500px at 85% 15%, rgba(44, 138, 114, 0.32), transparent 60%),
        radial-gradient(550px 380px at 8% 88%, rgba(52, 95, 197, 0.25), transparent 60%),
        linear-gradient(160deg, #0d1a21 0%, #0b141d 45%, #0a1019 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .panel {
      width: min(760px, 100%);
      background: rgba(18, 33, 40, 0.76);
      border: 1px solid #2a5f66;
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 14px 42px rgba(0, 0, 0, 0.35);
    }
    .kicker {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #98e6cc;
      border: 1px solid #3f8d77;
      border-radius: 999px;
      padding: 4px 10px;
      margin-bottom: 14px;
    }
    h1 {
      font-size: 34px;
      margin-bottom: 10px;
      color: #c8fff0;
    }
    p {
      color: #a8d7ce;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    a {
      display: inline-block;
      text-decoration: none;
      color: #eaf3ff;
      background: #2e6d6e;
      border: 1px solid #429091;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 600;
    }
    a:hover { background: #3c8082; }
  </style>
</head>
<body>
  <main class="panel">
    <span class="kicker">Items Lab</span>
    <h1>Work In Progress</h1>
    <p>The Items Lab is not available yet. This page is reserved for upcoming item management tooling.</p>
    <a href="/">Back To Lab Selector</a>
  </main>
</body>
</html>
